<html>
    <head>
        <title> 0316-css大小與顏色</title>
        <!--HTML 註解-->
        <style>
        /* CSS註解 */
        /*CSS基礎語法
        選擇器Selector{
        property:value;
        屬性:設定值;
        屬性:設定值;
        }
        選擇器有三種寫法:html_tag/#id/.class
        */
        div{
width: 200px;
height: 200px;
display: inline-block;/*div的預設值是block*/
background:green;
        }
        span{
            width: 200px;
            height: 200px;
            display: inline-block;/*span 的預設值是inline*/
        background: pink;

        }

        #d1{
background: blue !important;
background-color: black;
        }
#d1{
    background: blue !important;
    background-color:black;
}
    /*同一個屬性，後寫的設定會覆蓋先寫的設定。與寫在class的順序無關。
    除非有!important 改變重要性。
    優先順序:!important > #id > .class >html_tag
    */
.c1{
background:red !important;
}
.c2{
    background:rgb(255,100,0);
}
/*CSS顏色的表示法:
1.常見英文單字
2.#RRGGBB #000000~#FFFFFF
3.rgb(r,g,b)0~255(三原色光的強度)
4.hsl(h色相0~360,s彩度0%~100%,L亮度0%~100%)
5.rgba(r,g,b,a 0~1可見度)
6.shla(h,s,l,a可見度0~1)
*/

        </style>
        
    </head>
<body>
    <!--div:區域容器 block-->
    <div id="d1" class="c1"></div>
    <div id="d2"class="c1 c2"></div>

    <!--span:行內容氣inline-->
    <span id="s1"class="c2"></span>
    <span id="s2"class="c2 c1"></span>
</body>

</html>
